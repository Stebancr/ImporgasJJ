events {}

http {
    # Manejo dinámico de WebSocket (necesario para Vite HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    # ─── Frontend Software (frontend_S) → puerto 80 ───────────────────────────
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 50M;

        # API → Django backend (strip /api/ prefix)
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
        }

        # Archivos estáticos del admin de Django
        location /static/ {
            proxy_pass http://backend:8000/static/;
        }

        # Frontend Software — Vite HMR WebSocket
        location / {
            proxy_pass http://frontend-software:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ─── Frontend Ecommerce (frontend_U) → puerto 81 ──────────────────────────
    server {
        listen 81;
        server_name localhost;
        client_max_body_size 50M;

        # API → Django backend (strip /api/ prefix)
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
        }

        # Archivos estáticos del admin de Django
        location /static/ {
            proxy_pass http://backend:8000/static/;
        }

        # Frontend Ecommerce — Vite HMR WebSocket
        location / {
            proxy_pass http://frontend-ecommerce:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
